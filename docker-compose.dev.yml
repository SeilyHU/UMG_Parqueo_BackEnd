services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    network_mode: "bridge"
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env